name: Package Boxwright (Windows)

# Builds the self-contained Windows ZIP (app + bundled QEMU) on a version tag or manual
# dispatch, and attaches it to the GitHub Release. Companion to publish-qmp.yml.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.1.0)'
        required: true

permissions:
  contents: write   # attach the ZIP as a Release asset (uses the built-in GITHUB_TOKEN)

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package
        shell: pwsh
        run: ./tools/package-windows.ps1 -Version ${{ steps.version.outputs.value }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Boxwright-win-x64
          path: artifacts/win-x64/*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/win-x64/*.zip
