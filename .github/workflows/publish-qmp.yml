name: Publish Boxwright.Qmp

# Packs and publishes Boxwright.Qmp to NuGet when a version tag (e.g. v0.1.0) is pushed,
# or on manual dispatch. The API key lives in the NUGET_API_KEY repo secret — it never
# touches a developer machine.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish (e.g. 0.1.0)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: >-
          dotnet pack src/Boxwright.Qmp/Boxwright.Qmp.csproj
          -c Release
          -p:Version=${{ steps.version.outputs.value }}
          -o artifacts

      - name: Push to NuGet
        run: >-
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
